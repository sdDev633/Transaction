<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE - Modern Streetwear</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* (ALL YOUR CSS REMAINS EXACTLY THE SAME — unchanged) */
    </style>
</head>
<body>

<header>
    <nav>
        <a href="#" class="logo" onclick="showPage('home')">VIBE</a>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')">Home</a>
            <a href="#" onclick="showPage('products')">Shop</a>
            <button class="cart-btn" onclick="showPage('cart')">
                Cart
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </nav>
</header>

<main>
    <!-- (ALL YOUR HTML CONTENT REMAINS SAME) -->
</main>

<script>
    // ❌ Removed: dataLayer + tracking

    // Currency Configuration
    const CURRENCY = 'USD';
    const SHIPPING_COST = 15.00;

    // Products Database
    const products = [
        { id: 1, item_id: 'VIBE-001', name: 'Urban Hoodie', category: 'Hoodies', price: 89.99, image: 'HOOD', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 2, item_id: 'VIBE-002', name: 'Street Joggers', category: 'Pants', price: 69.99, image: 'JOGS', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 3, item_id: 'VIBE-003', name: 'Classic Tee', category: 'T-Shirts', price: 39.99, image: 'TEE', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 4, item_id: 'VIBE-004', name: 'Cargo Pants', category: 'Pants', price: 79.99, image: 'CARGO', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 5, item_id: 'VIBE-005', name: 'Oversized Jacket', category: 'Jackets', price: 149.99, image: 'JACK', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 6, item_id: 'VIBE-006', name: 'Graphic Sweatshirt', category: 'Sweatshirts', price: 59.99, image: 'SWEAT', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 7, item_id: 'VIBE-007', name: 'Denim Jacket', category: 'Jackets', price: 119.99, image: 'DENIM', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 8, item_id: 'VIBE-008', name: 'Track Pants', category: 'Pants', price: 64.99, image: 'TRACK', item_brand: 'VIBE', item_list_name: 'All Products' },
        { id: 9, item_id: 'VIBE-009', name: 'Zip Hoodie', category: 'Hoodies', price: 94.99, image: 'ZIP', item_brand: 'VIBE', item_list_name: 'All Products' }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function init() {
        renderFeaturedProducts();
        renderAllProducts();
        updateCartCount();
    }

    function renderFeaturedProducts() {
        const container = document.getElementById('featuredProducts');
        const featured = products.slice(0, 3);
        container.innerHTML = featured.map((product, index) => createProductCard(product, index)).join('');
    }

    function renderAllProducts() {
        const container = document.getElementById('allProducts');
        container.innerHTML = products.map((product, index) => createProductCard(product, index)).join('');
    }

    function createProductCard(product, index) {
        return `
            <div class="product-card" onclick="viewProductDetail(${product.id}, ${index})">
                <div class="product-image">${product.image}</div>
                <div class="product-info">
                    <div class="product-name">${product.name}</div>
                    <div class="product-category">${product.category}</div>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                    <button class="add-to-cart" onclick="event.stopPropagation(); addToCart(${product.id}, ${index})">
                        Add to Cart
                    </button>
                </div>
            </div>
        `;
    }

    function viewProductDetail(productId, index) {
        // Tracking removed
    }

    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        const existingItem = cart.find(item => item.id === productId);

        if (existingItem) {
            existingItem.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }

        saveCart();
        updateCartCount();
        showNotification('Added to cart!');
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveCart();
        updateCartCount();
        renderCart();
    }

    function updateQuantity(productId, change) {
        const item = cart.find(item => item.id === productId);
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) {
                removeFromCart(productId);
            } else {
                saveCart();
                renderCart();
            }
        }
    }

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function updateCartCount() {
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cartCount').textContent = count;
    }

    function calculateTotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }

    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(page => {
            page.classList.remove('active');
        });
        document.getElementById(pageName).classList.add('active');

        if (pageName === 'cart') renderCart();

        window.scrollTo(0, 0);
    }

    function showNotification(message) {
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.cssText = `
            position: fixed;
            top: 100px;
            right: 20px;
            background: #00ff88;
            color: #0a0a0a;
            padding: 1rem 2rem;
            border-radius: 4px;
            font-weight: 600;
            z-index: 10000;
        `;
        document.body.appendChild(notification);

        setTimeout(() => notification.remove(), 2000);
    }

    init();
</script>

</body>
</html>
